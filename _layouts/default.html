<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title | strip }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #2c3a3f;
      background: #f6f9f7;
      line-height: 1.55;
      font-size: 16px;
    }
    .site-header {
      max-width: 880px;
      margin: 0 auto;
      padding: 28px 24px 0;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    .site-header .site-title {
      font-size: 0.95em;
      font-weight: 600;
      color: #4a8a7a;
      letter-spacing: 0.02em;
    }
    .site-header .site-subtitle {
      font-size: 0.85em;
      color: #6a7a82;
    }
    main {
      max-width: 880px;
      margin: 0 auto;
      padding: 16px 24px 48px;
    }
    .page-footer {
      max-width: 880px;
      margin: 0 auto;
      padding: 24px;
      text-align: center;
      color: #8a979e;
      font-size: 0.88em;
      border-top: 1px solid #e3ebe7;
    }
    .page-footer a { color: #4a8a7a; text-decoration: none; }
    .page-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header class="site-header">
    <span class="site-title">{{ site.title }}</span>
    <span class="site-subtitle">{{ site.description }}</span>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="page-footer">
    Built on ESP-IDF + FreeRTOS · <a href="https://github.com/peytonlynnbarnes">github.com/peytonlynnbarnes</a>
  </footer>
</body>
</html>
